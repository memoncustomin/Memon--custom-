<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memon Custom</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b0f14;color:#fff;}
section{padding:80px 8%;}
.highlight{color:#00e0b8;}
.btn{background:#00e0b8;color:#000;padding:12px 28px;border-radius:30px;font-weight:600;text-decoration:none;border:none;cursor:pointer;}
.btn:hover{background:#00b89c;}

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
font-size:22px;
font-weight:700;
background:#0f141a;
}
header img{
width:40px;
height:40px;
object-fit:contain;
}

.hero{
min-height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle at top, rgba(0,224,184,0.15), transparent 60%);
}
.hero h1{font-size:42px;margin-bottom:15px;}

.bottle-row{display:flex;gap:40px;margin-top:50px;flex-wrap:wrap;justify-content:center;}
.bottle{width:150px;height:280px;background:linear-gradient(to bottom,#1a1f26,#111);border-radius:20px;box-shadow:0 0 25px rgba(0,224,184,0.3);}

.prices{text-align:center;}
.price-box{margin-top:30px;display:flex;justify-content:center;gap:40px;flex-wrap:wrap;}
.price-card{background:#11161c;padding:25px;border-radius:15px;min-width:150px;}

.gallery{background:#0f141a;text-align:center;}
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:40px;
}
.gallery-grid img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}
.delete-btn{
background:red;
color:#fff;
border:none;
padding:6px 10px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
}

#qrcode{margin-top:30px;display:flex;justify-content:center;}

.contact{text-align:center;}
footer{text-align:center;padding:40px;background:#0b0f14;font-size:14px;}

.whatsapp{position:fixed;bottom:20px;right:20px;background:#00e676;color:#000;padding:14px 18px;border-radius:50px;font-weight:600;text-decoration:none;}

.admin-btn{position:fixed;top:20px;right:20px;background:#111;padding:10px 15px;border-radius:8px;cursor:pointer;}
.admin-panel{position:fixed;top:0;right:-400px;width:350px;height:100%;background:#11161c;padding:30px;transition:0.4s;overflow-y:auto;}
.admin-panel.active{right:0;}
.admin-panel input{width:100%;margin-top:10px;padding:8px;background:#1c232c;border:none;color:#fff;border-radius:6px;}
.admin-panel h3{margin-top:20px;}
.close-admin{margin-top:20px;background:red;color:#fff;padding:8px;border:none;cursor:pointer;border-radius:6px;}
</style>
</head>
<body>

<header>
<img src="logo.png" alt="Logo">
<div>MEMON <span class="highlight">CUSTOM</span></div>
</header>

<div class="admin-btn" onclick="openAdmin()">Admin</div>

<div class="admin-panel" id="adminPanel">
<h2>Admin Login</h2>
<div id="loginSection">
<input type="password" id="adminPassword" placeholder="Enter Password">
<button class="btn" onclick="checkLogin()">Login</button>
</div>

<div id="adminControls" style="display:none;">
<h3>Upload Gallery Image</h3>
<input type="file" id="galleryUpload" accept="image/*">

<h3>Change Password</h3>
<input type="password" id="newPassword" placeholder="New Password">

<button class="btn" onclick="saveSettings()">Save</button>
<button class="close-admin" onclick="closeAdmin()">Close</button>
</div>
</div>

<section class="hero">
<h1>PURE WATER.<br><span class="highlight">POWERFUL BRANDING.</span></h1>
<a href="#" class="btn" onclick="orderNow()">Request Quote</a>

<div class="bottle-row">
<div class="bottle"></div>
<div class="bottle"></div>
<div class="bottle"></div>
</div>
</section>

<section class="gallery">
<h2>Our Recent Work</h2>
<div class="gallery-grid" id="galleryGrid"></div>
</section>

<section style="text-align:center;">
<h2>Scan & Order</h2>
<div id="qrcode"></div>
</section>

<section class="contact">
<h2>Contact Us</h2>
<p>Main WhatsApp: 8237599344</p>
<p>Secondary: 7219299344</p>
<p>Palghar, Maharashtra</p>
</section>

<footer>© 2026 Memon Custom</footer>

<a id="whatsappBtn" class="whatsapp" href="#" target="_blank">WhatsApp</a>

<script>
let savedPassword = localStorage.getItem("adminPass") || "1234";
let whatsappNumber = "8237599344";

function generateQR(){
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text: window.location.href,
width:150,
height:150
});
}
generateQR();

function orderNow(){
let message="Hello MEMON CUSTOM, I want to customize bottles.";
window.open("https://wa.me/91"+whatsappNumber+"?text="+encodeURIComponent(message));
}

document.getElementById("whatsappBtn").href="https://wa.me/91"+whatsappNumber;

function openAdmin(){document.getElementById("adminPanel").classList.add("active");}
function closeAdmin(){document.getElementById("adminPanel").classList.remove("active");}

function checkLogin(){
if(document.getElementById("adminPassword").value===savedPassword){
document.getElementById("loginSection").style.display="none";
document.getElementById("adminControls").style.display="block";
}else{alert("Wrong Password");}
}

function saveSettings(){
if(newPassword.value){
localStorage.setItem("adminPass",newPassword.value);
}
alert("Saved");
}

document.getElementById("galleryUpload").addEventListener("change",function(){
const file=this.files[0];
if(!file) return;

const reader=new FileReader();
reader.onload=function(e){
let images=JSON.parse(localStorage.getItem("galleryImages")||"[]");
images.push(e.target.result);
localStorage.setItem("galleryImages",JSON.stringify(images));
loadGallery();
}
reader.readAsDataURL(file);
});

function loadGallery(){
const grid=document.getElementById("galleryGrid");
grid.innerHTML="";
let images=JSON.parse(localStorage.getItem("galleryImages")||"[]");

images.forEach((src,index)=>{
let div=document.createElement("div");
let img=document.createElement("img");
img.src=src;

let del=document.createElement("button");
del.innerText="Delete";
del.className="delete-btn";
del.onclick=function(){
images.splice(index,1);
localStorage.setItem("galleryImages",JSON.stringify(images));
loadGallery();
};

div.appendChild(img);
div.appendChild(del);
grid.appendChild(div);
});
}

loadGallery();
</script>

</body>
</html>
