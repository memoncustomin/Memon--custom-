<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memon Custom</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

header {
  padding: 25px;
  font-size: 28px;
  font-weight: bold;
  background: #111;
}

.section {
  padding: 30px 20px;
}

.card {
  background: #1c1c1c;
  margin: 15px;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  padding: 10px;
  margin: 8px;
  border-radius: 6px;
  border: none;
  width: 80%;
}

button {
  padding: 12px 20px;
  margin-top: 15px;
  border-radius: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.preview {
  margin-top: 15px;
  padding: 15px;
  background: #222;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>Memon Custom</header>

<div class="section">
  <h2>Premium Customized Water Bottles</h2>
  <p>Design your label and order directly.</p>
</div>

<div class="section card">
  <h3>Customize Your Bottle</h3>
  
  <input type="text" id="name" placeholder="Your Brand Name">

  <select id="color">
    <option value="Gold">Gold Theme</option>
    <option value="Silver">Silver Theme</option>
    <option value="Black">Black Theme</option>
  </select>

  <input type="number" id="qty" placeholder="Quantity">

  <button onclick="previewDesign()">Preview Design</button>

  <div class="preview" id="previewBox"></div>

  <button class="whatsapp" onclick="orderNow()">Order on WhatsApp</button>
</div>

<div class="section">
  <p>Bulk Orders Available for Resorts, Events & Businesses</p>
</div>

<div class="section">
  <p>© 2026 Memon Custom</p>
</div>

<script>
function previewDesign() {
  const name = document.getElementById("name").value;
  const color = document.getElementById("color").value;
  const qty = document.getElementById("qty").value;

  document.getElementById("previewBox").innerHTML =
    "<strong>Brand:</strong> " + name +
    "<br><strong>Theme:</strong> " + color +
    "<br><strong>Quantity:</strong> " + qty;
}

function orderNow() {
  const name = document.getElementById("name").value;
  const color = document.getElementById("color").value;
  const qty = document.getElementById("qty").value;

  const message = "Hello, I want to order customized bottles.%0A" +
                  "Brand: " + name + "%0A" +
                  "Theme: " + color + "%0A" +
                  "Quantity: " + qty;

  window.location.href = "https://wa.me/918237599344/7219299344?text=" + message;
}
</script>

</body>
</html>
